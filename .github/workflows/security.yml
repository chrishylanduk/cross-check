name: Security Scanning

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 07:00 UTC — catches newly published CVEs against pinned deps
    - cron: "0 7 * * *"

permissions:
  contents: read
  security-events: write  # required for uploading SARIF results

jobs:
  # ── Python security scanning ───────────────────────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -c pyproject.toml -r src/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Fail on high/medium findings
        run: bandit -c pyproject.toml -r src/ --severity-level medium

  # ── Python dependency audit ────────────────────────────────────────────────
  pip-audit:
    name: pip-audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Run pip-audit
        run: |
          pip install pip-audit
          uv export --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
          pip-audit -r /tmp/requirements.txt

  # ── Frontend dependency audit ──────────────────────────────────────────────
  npm-audit:
    name: npm audit (frontend dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── Frontend SAST (ESLint security plugins) ───────────────────────────────
  eslint-security:
    name: ESLint security (frontend SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Run ESLint security rules
        working-directory: frontend
        run: npx eslint pages/ components/ --ext .ts,.tsx --max-warnings 0

  # ── Secret detection ───────────────────────────────────────────────────────
  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # full history for baseline comparison

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.*/tests/.*' \
            --exclude-files '^\.cruft\.json$' \
            --exclude-files '^uv\.lock$' \
            --exclude-files '^frontend/package-lock\.json$' \
            > .secrets.baseline.new
          detect-secrets audit .secrets.baseline.new
