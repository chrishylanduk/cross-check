# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        name: ruff - Python linter
        args: [ --fix ]
      - id: ruff-format
        name: ruff - Python formatter

  - repo: local
    hooks:
      - id: ty
        name: ty - Python type checker
        language: system
        entry: uv run ty check
        types: [ python ]
        pass_filenames: false

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        name: nbstripout - Strip outputs from notebooks (auto-fixes)
        args:
          - --extra-keys
          - "metadata.colab metadata.kernelspec cell.metadata.colab cell.metadata.executionInfo cell.metadata.id cell.metadata.outputId"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        name: Check for files larger than 5 MB
        args: [ "--maxkb=5120" ]
      - id: check-json
        name: Check JSON syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-yaml
        name: Check YAML syntax
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: end-of-file-fixer
        name: Check for a blank line at the end of scripts (auto-fixes)
        exclude: '\.Rd'
      - id: trailing-whitespace
        name: Check for trailing whitespaces (auto-fixes)
      - id: no-commit-to-branch
        name: Prevent commits directly to main
        args: [ "--branch", "main" ]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets - Detect secrets in staged code
        exclude: .*/tests/.*|^\.cruft\.json$

  - repo: https://github.com/semgrep/semgrep
    rev: v1.162.0
    hooks:
      - id: semgrep
        name: Semgrep SAST
        args:
          - scan
          - --config=p/python
          - --config=p/typescript
          - --config=p/react
          - --config=p/owasp-top-ten
          - --config=p/secrets
          - --error
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit - Python security linter
        args: ["-c", "pyproject.toml", "--severity-level", "medium"]
        types: [python]

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit - Python dependency vulnerabilities
        language: system
        # strawberry-graphql is pinned by arize-phoenix; ignored until upstream releases a fix.
        entry: bash -c 'uv run pip-audit --path .venv --ignore-vuln CVE-2026-45739'
        pass_filenames: false
        files: '^(pyproject\.toml|uv\.lock)$'

      - id: npm-audit
        name: npm audit - Frontend dependency vulnerabilities
        language: system
        entry: bash -c 'cd frontend && npm audit --audit-level=high'
        pass_filenames: false
        files: '^frontend/package(-lock)?\.json$'

      - id: eslint-security
        name: ESLint security rules
        language: system
        entry: bash -c 'cd frontend && npx eslint pages/ components/ --ext .ts,.tsx --max-warnings 0'
        pass_filenames: false
        files: '^frontend/.*\.(ts|tsx)$'

      - id: typescript
        name: TypeScript type check
        language: system
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        pass_filenames: false
        files: '^frontend/.*\.(ts|tsx)$'

      - id: pytest
        name: pytest - Python tests
        language: system
        entry: uv run pytest tests/
        pass_filenames: false
        files: '^(src/|tests/).*\.py$'

      - id: vitest
        name: vitest - Frontend tests
        language: system
        entry: bash -c 'cd frontend && npm test'
        pass_filenames: false
        files: '^frontend/(__tests__|lib|middleware).*\.(ts|tsx)$'
