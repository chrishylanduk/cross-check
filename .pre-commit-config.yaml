# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        name: ruff - Python linter
        args: [ --fix ]
      - id: ruff-format
        name: ruff - Python formatter

  - repo: local
    hooks:
      - id: ty
        name: ty - Python type checker
        language: system
        entry: uv run ty check
        types: [ python ]
        pass_filenames: false

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        name: nbstripout - Strip outputs from notebooks (auto-fixes)
        args:
          - --extra-keys
          - "metadata.colab metadata.kernelspec cell.metadata.colab cell.metadata.executionInfo cell.metadata.id cell.metadata.outputId"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        name: Check for files larger than 5 MB
        args: [ "--maxkb=5120" ]
      - id: check-json
        name: Check JSON syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-yaml
        name: Check YAML syntax
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: end-of-file-fixer
        name: Check for a blank line at the end of scripts (auto-fixes)
        exclude: '\.Rd'
      - id: trailing-whitespace
        name: Check for trailing whitespaces (auto-fixes)
      - id: no-commit-to-branch
        name: Prevent commits directly to main
        args: [ "--branch", "main" ]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets - Detect secrets in staged code
        exclude: .*/tests/.*|^\.cruft\.json$

  - repo: local
    hooks:
      - id: typescript
        name: TypeScript type check
        language: system
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        pass_filenames: false
        files: '^frontend/.*\.(ts|tsx)$'
