services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cross-check-backend
    ports:
      - "8000:8000"
    environment:
      # Override CORS origins for Docker network
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      - ENVIRONMENT=production
    networks:
      - cross-check-network
    restart: unless-stopped
    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: false  # Need write access for /app/data/collections (ephemeral)
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cross-check-frontend
    ports:
      - "3000:3000"
    environment:
      # API endpoint for backend service
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cross-check-network
    restart: unless-stopped
    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  cross-check-network:
    driver: bridge
